{% extends "blog/base.html" %}

{% block content %}
  <h2>Create a New Post</h2>

  {% block title %}Create Post{% endblock %}
  
  <form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    
    {{ form.as_p }}
    
    <button type="submit">Save Post</button>
  </form>
{% endblock %}
