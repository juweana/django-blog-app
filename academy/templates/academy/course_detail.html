{% extends "academy/base.html" %}

{% block title %}{{ course.title }}{% endblock %}

{% block content %}
<div class="card">
  <h1>{{ course.title }}</h1>
  <p>{{ course.description}}</p>
  <p>Duration: {{ course.duration }}</p>
  <p>Fee: {{ course.fee }}</p>
  <p><a href="{% url 'academy:courses' %}">Back to all courses</a></p>
</div>
{% endblock %}
